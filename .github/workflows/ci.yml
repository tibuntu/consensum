name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    env:
      # Absolute path so the prisma CLI (migrate) and vitest open the SAME SQLite file
      # regardless of each process's working directory.
      DATABASE_URL: "file:${{ github.workspace }}/data/app.db"
      BETTER_AUTH_SECRET: "ci-secret-not-for-production-change-me-32+"
      BETTER_AUTH_URL: "http://localhost:3000"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      # DB-backed unit tests (auth, schema) need a migrated SQLite DB. Use the project's
      # pinned prisma (pnpm exec), not pnpm dlx (which fetches a different version).
      - run: mkdir -p data && pnpm exec prisma migrate deploy
      - run: pnpm test:unit
      - run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "file:${{ github.workspace }}/data/app.db"
      BETTER_AUTH_SECRET: "ci-secret-not-for-production-change-me-32+"
      BETTER_AUTH_URL: "http://localhost:3000"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: mkdir -p data && pnpm exec prisma migrate deploy
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          push: false
          tags: quorum-ai:ci
