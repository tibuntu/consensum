name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    env:
      # Absolute path so the prisma CLI (migrate) and vitest open the SAME SQLite file
      # regardless of each process's working directory.
      DATABASE_URL: "file:${{ github.workspace }}/data/app.db"
      BETTER_AUTH_SECRET: "ci-secret-not-for-production-change-me-32+"
      BETTER_AUTH_URL: "http://localhost:3000"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      # DB-backed unit tests (auth, schema) need a migrated SQLite DB. Use the project's
      # pinned prisma (pnpm exec), not pnpm dlx (which fetches a different version).
      - run: mkdir -p data && pnpm exec prisma migrate deploy
      - run: pnpm test:unit
      - run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "file:${{ github.workspace }}/data/app.db"
      BETTER_AUTH_SECRET: "ci-secret-not-for-production-change-me-32+"
      BETTER_AUTH_URL: "http://localhost:3000"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: mkdir -p data && pnpm exec prisma migrate deploy
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # required to push images to GHCR
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/quorumai
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      # Authenticate to GHCR only when we'll actually push (not on PRs, where the
      # token is read-only and secrets are unavailable for forks).
      - if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Derive tags/labels from the git ref:
      #   push to main      -> :main, :edge
      #   tag vX.Y.Z        -> :X.Y.Z, :X.Y, :latest
      #   pull request       -> :pr-<n> (built but not pushed)
      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=edge,branch=main
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          # Push on main pushes and on version tags; never on pull requests.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
