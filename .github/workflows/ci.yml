name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

# Least-privilege default for all jobs; the docker job widens this with its own
# block (packages: write) to push to GHCR.
permissions:
  contents: read

# Cancel superseded PR runs; never cancel main/tag runs (they build+push images).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Skip re-running the test suite on a push to main when the commit already
  # arrived via a merged PR (validated there). Direct pushes to main and tag
  # pushes still run. The docker job below still runs on main regardless (it
  # builds and pushes the image) — see its `if`.
  gate:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run: ${{ steps.decide.outputs.run }}
    steps:
      - id: decide
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" != "push" ] || [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          prs=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" --jq 'length')
          if [ "$prs" -gt 0 ]; then
            echo "From a merged PR — already validated; skipping test re-run on main."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

  lint-test-build:
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-24.04
    env:
      # Absolute path so the prisma CLI (migrate) and vitest open the SAME SQLite file
      # regardless of each process's working directory.
      DATABASE_URL: "file:${{ github.workspace }}/data/app.db"
      AUTH_SECRET: "ci-secret-not-for-production-change-me-32+"
      BASE_URL: "http://localhost:3000"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      # The Postgres schema is generated from the canonical sqlite schema — fail if it's stale.
      - run: node scripts/gen-postgres-schema.mjs --check
      # DB-backed unit tests (auth, schema) need a migrated SQLite DB. Use the project's
      # pinned prisma (pnpm exec), not pnpm dlx (which fetches a different version).
      - run: mkdir -p data && pnpm exec prisma migrate deploy
      - run: pnpm test:unit
      - run: pnpm build

  e2e:
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-24.04
    env:
      DATABASE_URL: "file:${{ github.workspace }}/data/app.db"
      AUTH_SECRET: "ci-secret-not-for-production-change-me-32+"
      BASE_URL: "http://localhost:3000"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: mkdir -p data && pnpm exec prisma migrate deploy
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
      # Agent-contract conformance: a real push→request-changes→revise→409→approve
      # round-trip against a booted app, on its own port + throwaway DB. Re-derives
      # the evidence transcripts on every run so the agent contract can't silently rot.
      - name: Agent-contract harness
        run: pnpm test:harness
        env:
          HARNESS_DB_URL: "file:${{ github.workspace }}/data/harness.db"
      - if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: agent-contract-evidence
          path: .planning/ai-integration/evidence/
          retention-days: 7

  # Provider parity: run the same unit suite against a real PostgreSQL service so the
  # dual-DB support can't silently regress. SQLite coverage stays in lint-test-build.
  test-postgres:
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: consensum
          POSTGRES_PASSWORD: consensum
          POSTGRES_DB: consensum
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U consensum -d consensum"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DB_PROVIDER: postgres
      DATABASE_URL: "postgresql://consensum:consensum@localhost:5432/consensum"
      AUTH_SECRET: "ci-secret-not-for-production-change-me-32+"
      BASE_URL: "http://localhost:3000"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: pnpm
      # postinstall runs `prisma generate`; with DB_PROVIDER=postgres it produces the
      # Postgres client, and migrate deploy applies the Postgres migration lineage.
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prisma migrate deploy
      - run: pnpm test:unit

  # Multi-arch build matrix: one native runner per platform (no QEMU). Each leg
  # builds, Trivy-scans, and pushes its single-arch image BY DIGEST (no tag). The
  # docker-merge job then assembles the tagged multi-arch manifest from the
  # per-arch digests. Building natively means better-sqlite3 and the Prisma client
  # are compiled/generated on the real target arch — no emulation.
  docker:
    runs-on: ${{ matrix.runner }}
    # Gate the (expensive, multi-arch) image build on a green test suite: build
    # only once lint+unit+build and the e2e/agent-contract suite pass — OR were
    # skipped because the gate already validated this commit on its PR (a push to
    # main from a merged PR). `result != 'failure'` covers success + skipped while
    # still blocking on a genuine test failure.
    needs: [lint-test-build, e2e, test-postgres]
    # Skip the (expensive, multi-arch) image build on release-please PRs: they only
    # bump the changelog/version and carry no code change, so there's nothing new to
    # build or scan. `head_ref` is empty for push/tag events, so main pushes and the
    # release tag (which builds+pushes the semver image) are unaffected.
    if: >-
      !cancelled() &&
      !startsWith(github.head_ref, 'release-please--') &&
      needs.lint-test-build.result != 'failure' &&
      needs.e2e.result != 'failure' &&
      needs.test-postgres.result != 'failure'
    permissions:
      contents: read
      packages: write # required to push images to GHCR
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/consensum
    steps:
      # Filesystem-safe platform name (linux/amd64 -> linux-amd64) for cache
      # scopes and digest artifact names.
      - name: Prepare platform name
        run: echo "PLATFORM_PAIR=${PLATFORM//\//-}" >> "$GITHUB_ENV"
        env:
          PLATFORM: ${{ matrix.platform }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      # Authenticate to GHCR only when we'll actually push (not on PRs, where the
      # token is read-only and secrets are unavailable for forks).
      - if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Only OCI labels are consumed here; the manifest tags are derived in the
      # docker-merge job. Labels are stamped onto each per-arch image.
      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.IMAGE_NAME }}
      # Build and load this platform's image locally first so Trivy can scan the
      # exact artifact before it is ever pushed. load:true works because each
      # matrix leg is single-platform on its native runner. Per-platform cache
      # scope keeps the two legs from clobbering each other's gha cache.
      - id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          load: true
          tags: ${{ env.IMAGE_NAME }}:scan-${{ env.PLATFORM_PAIR }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_PAIR }}
      # Vulnerability gate: fail on CRITICAL/HIGH that have a fix available
      # (ignore-unfixed) so actionable CVEs block, but un-patchable base-image
      # CVEs don't red-line the pipeline. Scans by image id, independent of tag.
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.build.outputs.imageid }}
          scanners: vuln
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
      # Push by digest only after a clean scan; never on pull requests. Layers are
      # already in the gha cache from the scan build, so this only exports the
      # manifest by digest and uploads. push-by-digest leaves the image untagged;
      # docker-merge applies the real tags to the combined manifest list.
      - id: push
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
      # Hand this platform's digest to docker-merge via a per-arch artifact. The
      # file is named after the bare digest; its contents are irrelevant.
      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.push.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"
      - name: Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # Assemble the per-arch digests pushed by the docker matrix into a single
  # multi-arch manifest list and apply the real tags. Runs only when the matrix
  # actually pushed (never on PRs).
  docker-merge:
    runs-on: ubuntu-24.04
    needs: docker
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write # required to push the manifest to GHCR
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/consensum
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Derive tags/labels from the git ref:
      #   push to main -> :main, :edge
      #   tag vX.Y.Z   -> :X.Y.Z, :X.Y, :latest
      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=edge,branch=main
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      # Create the manifest list (one -t per derived tag) from the per-arch
      # digests, then push it, then verify the architectures landed.
      - name: Create and push manifest list
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE_NAME }}@sha256:%s ' *)
      - name: Inspect manifest
        run: docker buildx imagetools inspect "${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}"
