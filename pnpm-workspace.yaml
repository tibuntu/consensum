overrides:
  better-call: 1.3.6
  kysely: 0.28.17
  # Force a single @codemirror/state: @codemirror/view@6.43 needs ^6.7 while the
  # @uiw/react-codemirror stack resolved 6.6, and two copies break CodeMirror's
  # singleton in the production bundle (the editor never mounts).
  '@codemirror/state': 6.7.0
# pnpm 11 replaced onlyBuiltDependencies/ignoredBuiltDependencies with a single
# allowBuilds map (true = run build scripts, false = skip). strictDepBuilds is on
# by default, so every dependency with a build script must be listed explicitly.
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  better-sqlite3: true
  prisma: true
  sharp: false
  unrs-resolver: false
