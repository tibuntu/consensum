services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "file:/data/app.db"
      AUTH_SECRET: "${AUTH_SECRET:?set AUTH_SECRET}"
      BASE_URL: "http://localhost:3000"
    volumes:
      - quorum-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/readyz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 3s
      start_period: 20s
      retries: 3
volumes:
  quorum-data:
